name: Deploy to Production

on:
    push:
        branches:
            - main # main 브랜치에 push할 때 자동 배포
            - production # production 브랜치에 push할 때 자동 배포
    workflow_dispatch: # 수동 실행도 가능

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            # 1. 코드 체크아웃
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. Node.js 설정
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            # 3. 의존성 설치
            - name: Install dependencies
              run: npm ci

            # 4. 프로덕션 빌드
            - name: Build application
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: production # 프로덕션 API URL 사용

            # 5. 배포 파일 준비 (public, static 복사 및 ZIP)
            - name: Prepare deployment files
              run: node scripts/prepare-deploy.js

            # 5-1. ZIP 파일 내용 확인 (디버그)
            - name: Verify ZIP contents
              run: |
                  echo "📦 ZIP 파일 크기:"
                  ls -lh wsa_vrs_client.zip
                  echo ""
                  echo "📦 ZIP 파일 내용물:"
                  unzip -l wsa_vrs_client.zip | head -50
                  echo ""
                  echo "📦 주요 파일 확인:"
                  unzip -l wsa_vrs_client.zip | grep -E "(server.js|package.json|public|.next/static)" || echo "⚠️  주요 파일 누락!"

            # 6. 서버로 ZIP 파일 전송 (appleboy/scp-action 사용)
            - name: Upload to server
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: mswpms.co.kr
                  username: root
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  passphrase: ${{ secrets.SSH_PASSPHRASE }}
                  port: 30022
                  source: "wsa_vrs_client.zip"
                  target: "~/com_wsa_client/com_wsa_vrs/deploy/"

            # 7. 서버에서 배포 스크립트 실행 (appleboy/ssh-action 사용)
            - name: Deploy on server
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: mswpms.co.kr
                  username: root
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  passphrase: ${{ secrets.SSH_PASSPHRASE }}
                  port: 30022
                  script: |
                      cd ~/com_wsa_client/com_wsa_vrs/deploy

                      # 기존 파일 백업
                      if [ -d "wsa_vrs_client" ]; then
                        mv wsa_vrs_client wsa_vrs_client_backup_$(date +%Y%m%d_%H%M%S)
                      fi

                      # 압축 해제
                      unzip -o wsa_vrs_client.zip

                      # Docker 컨테이너 재시작
                      cd ~/com_wsa_client/com_wsa_vrs
                      docker-compose restart wsa_vrs_client

                      # 정리
                      cd deploy
                      rm wsa_vrs_client.zip

                      # 오래된 백업 삭제 (최근 3개만 유지)
                      ls -t | grep wsa_vrs_client_backup | tail -n +4 | xargs -r rm -rf

                      echo "✅ 배포 완료!"

            # 10. 배포 결과 알림
            - name: Notify deployment status
              if: always()
              run: |
                  if [ ${{ job.status }} == 'success' ]; then
                    echo "✅ 배포 성공! 🎉"
                  else
                    echo "❌ 배포 실패! 로그를 확인하세요."
                  fi
